name: CI/CD Nexus Platform

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Nexus API
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nexus-api:latest
          cache-from: type=gha
          cache-to: type=inline

      # Build & Push Nexus Storefront
      - name: Build and push Storefront
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/storefront/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nexus-storefront:latest
          cache-from: type=gha
          cache-to: type=inline
