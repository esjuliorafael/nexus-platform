version: '3.9'

services:
  postgres-store:
    image: postgres:16-alpine
    container_name: nexus-store-db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
      POSTGRES_DB: nexus_store_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_store_data:/var/lib/postgresql/data

  postgres-raffle:
    image: postgres:16-alpine
    container_name: nexus-raffle-db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
      POSTGRES_DB: nexus_raffle_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_raffle_data:/var/lib/postgresql/data

  postgres-evolution:
    image: postgres:16-alpine
    container_name: nexus-evolution-db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
      POSTGRES_DB: evolution
    ports:
      - "5435:5432"
    volumes:
      - postgres_evolution_data:/var/lib/postgresql/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: nexus-evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_NAME=nexus-evolution-api
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=42247152-4740-4A0B-9759-4CC0E977114E
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://nexus:nexus_dev_password@postgres-evolution:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
    depends_on:
      - postgres-evolution
      - redis

  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    container_name: nexus-evolution-manager
    restart: always
    ports:
      - "8081:8080"
    environment:
      - VITE_EVOLUTION_API_URL=http://localhost:8080
      - VITE_EVOLUTION_API_KEY=42247152-4740-4A0B-9759-4CC0E977114E
    volumes:
      - ./nginx-manager.conf:/etc/nginx/conf.d/nginx.conf:ro

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"

volumes:
  postgres_store_data:
  postgres_raffle_data:
  postgres_evolution_data:
